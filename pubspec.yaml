name: trackmatee
description: Navigation app with dark map + Places autocomplete
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.0
  location: ^5.0.3
  permission_handler: ^11.0.1
  geolocator: ^10.1.0
  http: ^1.1.0
  flutter_polyline_points: ^2.0.0
  flutter_bloc: ^8.1.0
  equatable: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true